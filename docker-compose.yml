version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: traject-api
    restart: unless-stopped
    env_file:
      - .env.production
      - .env
    environment:
      NODE_ENV: production
      PORT: 8001
    ports:
      - "8001:8001"
    networks:
      - traject-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: traject-web
    restart: unless-stopped
    env_file:
      - .env.production
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - traject-network

  redis:
    image: valkey/valkey:8.1.3-alpine
    container_name: traject-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - traject-network

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z-cpuv1
    container_name: traject-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - traject-network

volumes:
  redis_data:
  minio_data:

networks:
  traject-network:
    driver: bridge
