version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: traject-api-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 8001
      BUN_ENV: development
    ports:
      - "8001:8001"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/apps/api/node_modules
      - /app/node_modules
    command: bun --hot apps/api/src/index.ts
    networks:
      - traject-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: traject-web-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/apps/web/.tamor-ui
      - /app/apps/web/.next
      - /app/node_modules
    command: bash scripts/start.sh next dev
    depends_on:
      - api
    networks:
      - traject-network

  redis:
    image: valkey/valkey:8.1.3-alpine
    container_name: traject-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - traject-network

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z-cpuv1
    container_name: traject-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - traject-network

volumes:
  redis_data:
  minio_data:

networks:
  traject-network:
    driver: bridge
